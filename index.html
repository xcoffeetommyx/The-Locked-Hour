<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#e8e0d1">
    <meta name="description" content="The Locked Hour, a digital horror novella by xCoffeeTommyx.">
    <title>The Locked Hour — xCoffeeTommyx</title>
    <link rel="stylesheet" href="styles.css">
    <script src="story.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body class="cover-active theme-normal">
    <a class="skip-link" href="#page-content">Skip to story</a>

    <div class="reader" id="reader" inert>
      <header class="reader-header" aria-label="Reader controls">
        <button class="quiet-button chapter-button" id="chapter-button" type="button" aria-haspopup="dialog">
          <span class="chapter-button__kicker">Contents</span>
          <span class="chapter-button__title" id="header-chapter">The Locked Hour</span>
        </button>

        <div class="header-progress" aria-live="polite">
          <span id="header-progress">Not started</span>
        </div>

        <button class="icon-button" id="settings-button" type="button" aria-label="Reading settings" aria-haspopup="dialog">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M5 7h14M8 12h8M10 17h4M8 5v4M16 10v4M12 15v4"/>
          </svg>
        </button>
      </header>

      <div class="progress-track" aria-hidden="true">
        <div class="progress-track__fill" id="progress-fill"></div>
      </div>

      <main class="book-stage">
        <article class="book-page" id="book-page" aria-live="polite">
          <div class="page-grain" aria-hidden="true"></div>
          <header class="page-heading">
            <p class="chapter-label" id="chapter-label"></p>
            <h1 id="page-title"></h1>
            <div class="title-ornament" aria-hidden="true"><span></span></div>
          </header>
          <div class="page-copy" id="page-content" tabindex="-1"></div>
          <footer class="page-footer" aria-hidden="true">
            <span id="folio-chapter"></span>
            <span class="folio-mark">◆</span>
            <span id="folio-number"></span>
          </footer>
        </article>
      </main>

      <nav class="reader-navigation" aria-label="Page navigation">
        <button class="nav-button nav-button--previous" id="previous-button" type="button">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
          <span>Previous</span>
        </button>
        <p class="page-status" id="page-status" aria-live="polite"></p>
        <button class="nav-button nav-button--next" id="next-button" type="button">
          <span id="next-label">Next</span>
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </nav>
    </div>

    <section class="cover" id="cover" aria-labelledby="cover-title">
      <div class="cover__weather" aria-hidden="true"></div>
      <div class="cover__inner">
        <p class="cover__edition">A digital novella</p>
        <h1 id="cover-title">The<br>Locked Hour</h1>
        <div class="cover__lock" aria-hidden="true">
          <span class="cover__lock-line"></span>
          <span class="cover__lock-gap"></span>
        </div>
        <p class="cover__author">xCoffeeTommyx</p>
        <button class="cover__button" id="start-button" type="button">
          <span id="start-label">Begin reading</span>
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
    </section>

    <dialog class="reader-dialog contents-dialog" id="contents-dialog">
      <div class="dialog-heading">
        <div>
          <p class="dialog-kicker">The Locked Hour</p>
          <h2>Contents</h2>
        </div>
        <button class="icon-button dialog-close" type="button" data-close-dialog aria-label="Close contents">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg>
        </button>
      </div>
      <nav class="chapter-list" id="chapter-list" aria-label="Chapters"></nav>
    </dialog>

    <dialog class="reader-dialog settings-dialog" id="settings-dialog">
      <div class="dialog-heading">
        <div>
          <p class="dialog-kicker">Display</p>
          <h2>Reading settings</h2>
        </div>
        <button class="icon-button dialog-close" type="button" data-close-dialog aria-label="Close settings">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg>
        </button>
      </div>
      <fieldset class="setting-group">
        <legend>Text size</legend>
        <div class="segmented-control">
          <button type="button" data-font-size="small">Small</button>
          <button type="button" data-font-size="medium">Default</button>
          <button type="button" data-font-size="large">Large</button>
        </div>
      </fieldset>
      <button class="restart-button" id="restart-button" type="button">Restart from the beginning</button>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <noscript>
      <div class="noscript-message">JavaScript is required to turn the pages of this edition.</div>
    </noscript>
  </body>
</html>
